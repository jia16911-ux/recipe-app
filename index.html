<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CookFromWhatYouHave Chef</title>
<style>
:root {
  --bg: #fff7ed;
  --panel: rgba(255,255,255,.9);
  --text: #24180f;
  --muted: #7c6a5b;
  --line: #ead8c5;
  --brand: #f97316;
  --brand-dark: #c2410c;
  --soft: #ffedd5;
  --lock: #92400e;
  --green: #15803d;
  --shadow: 0 18px 45px rgba(124,45,18,.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  color: var(--text);
  background: radial-gradient(circle at top left, #fed7aa 0, transparent 32%),
              radial-gradient(circle at bottom right, #fde68a 0, transparent 28%),
              var(--bg);
  padding: 24px;
}
.app { max-width: 880px; margin: 0 auto; }
.hero {
  padding: 28px 24px;
  border-radius: 30px;
  background: linear-gradient(135deg,#fff 0%,#ffedd5 100%);
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,.86);
  margin-bottom: 18px;
}
.nav {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
}
.logo {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  font-weight: 900;
}
.status {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.72);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 800;
}
.status.chef { background: #ecfdf5; color: var(--green); }
h1 { margin: 0 0 10px; font-size: 36px; letter-spacing: -.045em; }
.subtitle { margin: 0; color: var(--muted); line-height: 1.65; }
.grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.panel {
  background: var(--panel);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.88);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 12px 30px rgba(124,45,18,.08);
}
.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.section-title h3 { margin: 0; font-size: 18px; }
.hint { color: var(--muted); font-size: 12px; }
.input-row { display: flex; gap: 10px; }
input, select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 13px 14px;
  font-size: 15px;
  outline: none;
  background: #fffaf5;
}
input:focus, select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px rgba(249,115,22,.12);
}
button {
  border: 0;
  border-radius: 16px;
  padding: 13px 16px;
  font-weight: 900;
  cursor: pointer;
  transition: .18s ease;
  white-space: nowrap;
}
button:hover { transform: translateY(-1px); opacity: .95; }
.add-btn { background: var(--text); color: #fff; }
.primary-btn {
  width: 100%;
  color: #fff;
  background: linear-gradient(135deg,var(--brand),var(--brand-dark));
  box-shadow: 0 14px 26px rgba(249,115,22,.28);
}
.secondary-btn {
  background: #fff;
  color: var(--brand-dark);
  border: 1px solid rgba(249,115,22,.2);
}
.tags, .quick-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.tags { min-height: 42px; }
.tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: #fff;
  border: 1px solid var(--line);
  padding: 8px 11px;
  border-radius: 999px;
  font-size: 14px;
  box-shadow: 0 6px 14px rgba(124,45,18,.06);
}
.tag span {
  width: 18px;
  height: 18px;
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
  background: var(--soft);
  color: var(--brand-dark);
  cursor: pointer;
}
.quick {
  background: rgba(249,115,22,.10);
  color: var(--brand-dark);
  border: 1px solid rgba(249,115,22,.18);
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 13px;
}
.controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.paywall {
  border: 1px solid rgba(249,115,22,.28);
  background: linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,237,213,.92));
}
.pricing {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 12px;
}
.price-card {
  border: 1px solid var(--line);
  background: #fffaf5;
  border-radius: 20px;
  padding: 16px;
}
.price-card.chef-plan {
  border-color: rgba(249,115,22,.45);
  box-shadow: 0 12px 24px rgba(249,115,22,.12);
}
.price {
  font-size: 28px;
  font-weight: 950;
  margin: 8px 0;
}
.price small { font-size: 13px; color: var(--muted); }
.features {
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.8;
  margin: 10px 0 0;
}
.result-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  margin: 20px 4px 10px;
}
.result-head h2 { margin: 0; font-size: 22px; }
.result-count { color: var(--muted); font-size: 13px; }
.card {
  position: relative;
  background: rgba(255,255,255,.94);
  border: 1px solid rgba(234,216,197,.95);
  border-radius: 22px;
  padding: 16px;
  margin-top: 12px;
  box-shadow: 0 12px 28px rgba(124,45,18,.08);
  overflow: hidden;
}
.card.locked::after {
  content: "Chef 解锁";
  position: absolute;
  right: 14px;
  top: 14px;
  background: #fff7ed;
  color: var(--lock);
  border: 1px solid #fed7aa;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
}
.card-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}
.card h3 { margin: 0 0 8px; font-size: 20px; }
.pill {
  display: inline-flex;
  border-radius: 999px;
  padding: 6px 10px;
  background: #ecfdf5;
  color: #166534;
  font-size: 13px;
  font-weight: 900;
}
.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 9px 0;
}
.meta span {
  background: #fff7ed;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 9px;
  font-size: 13px;
}
.card p { color: var(--muted); line-height: 1.6; margin: 8px 0 0; }
.missing { color: #b45309; }
.lock-note {
  margin-top: 10px;
  padding: 10px 12px;
  background: #fffbeb;
  border: 1px solid #fde68a;
  color: #92400e;
  border-radius: 14px;
  font-size: 14px;
}
.empty {
  text-align: center;
  padding: 28px 18px;
  color: var(--muted);
  background: rgba(255,255,255,.72);
  border: 1px dashed var(--line);
  border-radius: 22px;
  margin-top: 12px;
  line-height: 1.7;
}
@media (min-width: 720px) {
  .grid { grid-template-columns: 1fr 1fr; }
  .controls { grid-template-columns: 1fr 1fr 1fr 1fr; align-items: center; }
  .pricing { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>
<div class="app">
  <section class="hero">
    <div class="nav">
      <div class="logo">🍳 CookFromWhatYouHave</div>
      <div id="planStatus" class="status">Free 版</div>
    </div>
    <h1>把冰箱里的东西，变成今晚的菜。</h1>
    <p class="subtitle">输入已有食材、厨具和偏好菜系，免费版显示基础推荐；Chef 版解锁更多菜谱、详细步骤和替代方案。</p>
  </section>

  <section class="panel paywall">
    <div class="section-title">
      <h3>💳 选择方案</h3>
      <span class="hint">当前是演示支付，不会真的扣款</span>
    </div>
    <div class="pricing">
      <div class="price-card">
        <strong>Free</strong>
        <div class="price">¥0</div>
        <ul class="features">
          <li>基础菜谱推荐</li>
          <li>最多显示 3 道结果</li>
          <li>隐藏详细替代方案</li>
        </ul>
        <button class="secondary-btn" onclick="setPlan(false)">使用 Free</button>
      </div>
      <div class="price-card chef-plan">
        <strong>Chef</strong>
        <div class="price">¥480 <small>/ 月</small></div>
        <ul class="features">
          <li>全部推荐结果</li>
          <li>详细做法和替代材料</li>
          <li>菜系偏好筛选</li>
        </ul>
        <button class="primary-btn" onclick="setPlan(true)">模拟开通 Chef</button>
      </div>
    </div>
  </section>

  <main class="grid" style="margin-top:16px;">
    <section class="panel">
      <div class="section-title">
        <h3>🥬 我有什么食材</h3>
        <span class="hint">逐个添加</span>
      </div>
      <div class="input-row">
        <input id="ingredientInput" placeholder="例如：鸡蛋" />
        <button class="add-btn" onclick="addIngredient()">添加</button>
      </div>
      <div class="quick-list" id="quickIngredients"></div>
      <div class="tags" id="ingredientTags"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h3>🍳 我有什么厨具</h3>
        <span class="hint">没有就不推荐</span>
      </div>
      <div class="input-row">
        <input id="toolInput" placeholder="例如：平底锅" />
        <button class="add-btn" onclick="addTool()">添加</button>
      </div>
      <div class="quick-list" id="quickTools"></div>
      <div class="tags" id="toolTags"></div>
    </section>
  </main>

  <section class="panel" style="margin-top:16px;">
    <div class="section-title">
      <h3>⚙️ 推荐条件</h3>
      <span class="hint">Chef 可用更多高级结果</span>
    </div>
    <div class="controls">
      <select id="cuisine">
        <option value="all" selected>不限菜系</option>
        <option value="中餐">中餐</option>
        <option value="日餐">日餐</option>
        <option value="韩餐">韩餐</option>
        <option value="东南亚菜">东南亚菜</option>
        <option value="意餐">意餐</option>
        <option value="法餐">法餐</option>
        <option value="家常">家常</option>
      </select>
      <select id="time">
        <option value="10">10分钟以内</option>
        <option value="20" selected>20分钟以内</option>
        <option value="30">30分钟以内</option>
        <option value="999">不限时间</option>
      </select>
      <select id="mode">
        <option value="normal" selected>普通推荐</option>
        <option value="lazy">懒人优先</option>
        <option value="rich">菜品丰富优先</option>
      </select>
      <button class="primary-btn" onclick="recommend()">推荐菜谱</button>
    </div>
  </section>

  <div class="result-head">
    <h2>推荐结果</h2>
    <div class="result-count" id="resultCount">还没有开始推荐</div>
  </div>
  <div id="result"></div>
</div>

<script>
let userIngredients = [];
let userTools = [];
let isChef = false;

const quickIngredients = ["鸡蛋", "米饭", "番茄", "鸡胸肉", "面条", "土豆", "洋葱", "豆腐", "牛肉", "虾仁", "蔬菜", "黑胡椒"];
const quickTools = ["平底锅", "炒锅", "空气炸锅", "微波炉", "电饭煲", "烤箱", "汤锅"];

const recipes = [
  { name:"番茄炒蛋", cuisine:"中餐", ingredients:["鸡蛋","番茄"], tools:["平底锅"], time:10, chef:false, substitute:"没有番茄可换成番茄罐头。", steps:"鸡蛋炒散盛出，番茄炒出汁，再把鸡蛋倒回锅里调味。" },
  { name:"蛋炒饭", cuisine:"中餐", ingredients:["鸡蛋","米饭"], tools:["炒锅"], time:10, chef:false, substitute:"炒锅可用平底锅代替，但米饭要少量多次炒。", steps:"鸡蛋炒散，加入米饭炒开，最后用盐或酱油调味。" },
  { name:"微波炉蒸蛋", cuisine:"家常", ingredients:["鸡蛋"], tools:["微波炉"], time:8, chef:false, substitute:"没有微波炉就改用蒸锅。", steps:"鸡蛋加温水搅匀，过滤后微波加热，凝固即可。" },
  { name:"黑椒鸡胸肉", cuisine:"家常", ingredients:["鸡胸肉","黑胡椒"], tools:["平底锅"], time:15, chef:false, substitute:"鸡胸肉可换成鸡腿肉，口感更嫩。", steps:"鸡胸肉切片调味，小火煎熟，撒黑胡椒即可。" },
  { name:"番茄鸡蛋盖饭", cuisine:"中餐", ingredients:["鸡蛋","番茄","米饭"], tools:["平底锅"], time:15, chef:true, substitute:"米饭可换成面条，变成番茄鸡蛋拌面。", steps:"做一份番茄炒蛋，直接盖在热米饭上。" },
  { name:"空气炸鸡胸肉", cuisine:"家常", ingredients:["鸡胸肉","黑胡椒"], tools:["空气炸锅"], time:18, chef:true, substitute:"黑胡椒可换成辣椒粉、孜然或咖喱粉。", steps:"鸡胸肉调味后放入空气炸锅，中途翻面一次。" },
  { name:"日式亲子丼简化版", cuisine:"日餐", ingredients:["鸡蛋","鸡胸肉","米饭","洋葱"], tools:["平底锅"], time:20, chef:true, substitute:"没有味醂时可用少量糖加酱油做简化调味。", steps:"鸡肉和洋葱煮熟后淋入蛋液，半熟状态盖在米饭上。" },
  { name:"韩式拌饭简化版", cuisine:"韩餐", ingredients:["米饭","鸡蛋","蔬菜"], tools:["平底锅"], time:20, chef:true, substitute:"没有韩式辣酱可用酱油加少量辣椒粉代替。", steps:"煎蛋，蔬菜简单炒熟，和米饭一起拌匀。" },
  { name:"虾仁炒面", cuisine:"中餐", ingredients:["虾仁","面条","洋葱"], tools:["炒锅"], time:15, chef:true, substitute:"虾仁可换成鸡胸肉丁或牛肉片。", steps:"面条煮熟后沥干，虾仁和洋葱炒香，再加入面条翻炒。" },
  { name:"意式番茄面", cuisine:"意餐", ingredients:["面条","番茄","洋葱"], tools:["平底锅"], time:20, chef:true, substitute:"新鲜番茄可换成番茄罐头，味道更稳定。", steps:"番茄和洋葱炒成酱汁，加入煮好的面条拌匀。" },
  { name:"法式煎蛋卷", cuisine:"法餐", ingredients:["鸡蛋"], tools:["平底锅"], time:10, chef:true, substitute:"可加入奶酪、火腿或蘑菇，但不是必须。", steps:"鸡蛋打散，小火推成嫩滑蛋卷，可加少量盐调味。" },
  { name:"东南亚虾仁炒饭", cuisine:"东南亚菜", ingredients:["虾仁","米饭","鸡蛋"], tools:["炒锅"], time:15, chef:true, substitute:"鱼露可用酱油代替，香气会弱一点。", steps:"虾仁煎香，加入鸡蛋和米饭翻炒，可用酱油或鱼露调味。" }
];

function setPlan(chef) {
  isChef = chef;
  const status = document.getElementById("planStatus");
  status.textContent = chef ? "Chef 已开通" : "Free 版";
  status.className = chef ? "status chef" : "status";
  recommend();
}

function setupQuickButtons() {
  document.getElementById("quickIngredients").innerHTML = quickIngredients.map(i =>
    `<button class="quick" onclick="addIngredient('${i}')">${i}</button>`
  ).join("");
  document.getElementById("quickTools").innerHTML = quickTools.map(t =>
    `<button class="quick" onclick="addTool('${t}')">${t}</button>`
  ).join("");
}

function addIngredient(valueFromButton) {
  const input = document.getElementById("ingredientInput");
  const value = (valueFromButton || input.value).trim();
  if (value && !userIngredients.includes(value)) {
    userIngredients.push(value);
    input.value = "";
    renderIngredientTags();
  }
}

function addTool(valueFromButton) {
  const input = document.getElementById("toolInput");
  const value = (valueFromButton || input.value).trim();
  if (value && !userTools.includes(value)) {
    userTools.push(value);
    input.value = "";
    renderToolTags();
  }
}

function renderIngredientTags() {
  document.getElementById("ingredientTags").innerHTML = userIngredients.map((item, index) =>
    `<div class="tag">${item}<span onclick="removeIngredient(${index})">×</span></div>`
  ).join("");
}

function renderToolTags() {
  document.getElementById("toolTags").innerHTML = userTools.map((item, index) =>
    `<div class="tag">${item}<span onclick="removeTool(${index})">×</span></div>`
  ).join("");
}

function removeIngredient(index) {
  userIngredients.splice(index, 1);
  renderIngredientTags();
}

function removeTool(index) {
  userTools.splice(index, 1);
  renderToolTags();
}

function recommend() {
  const cuisinePreference = document.getElementById("cuisine").value;
  const timeLimit = Number(document.getElementById("time").value);
  const mode = document.getElementById("mode").value;
  const resultDiv = document.getElementById("result");
  const countDiv = document.getElementById("resultCount");
  resultDiv.innerHTML = "";

  let results = recipes
    .map(recipe => {
      const matched = recipe.ingredients.filter(i => userIngredients.includes(i));
      const missing = recipe.ingredients.filter(i => !userIngredients.includes(i));
      const toolMissing = recipe.tools.filter(t => !userTools.includes(t));
      const score = Math.round((matched.length / recipe.ingredients.length) * 100);
      return { ...recipe, matched, missing, toolMissing, score };
    })
    .filter(recipe =>
      recipe.matched.length > 0 &&
      recipe.time <= timeLimit &&
      recipe.toolMissing.length === 0 &&
      (cuisinePreference === "all" || recipe.cuisine === cuisinePreference)
    );

  if (mode === "lazy") {
    results.sort((a,b) => a.time - b.time || a.missing.length - b.missing.length);
  } else if (mode === "rich") {
    results.sort((a,b) => b.ingredients.length - a.ingredients.length || b.score - a.score);
  } else {
    results.sort((a,b) => b.score - a.score || a.time - b.time);
  }

  const visibleResults = isChef ? results : results.slice(0, 3);
  countDiv.textContent = `找到 ${results.length} 道，当前显示 ${visibleResults.length} 道`;

  if (results.length === 0) {
    resultDiv.innerHTML = `<div class="empty"><strong>暂时没有符合条件的菜。</strong><br>可以多加一个厨具、换个菜系，或者把时间放宽一点。</div>`;
    return;
  }

  resultDiv.innerHTML = visibleResults.map(r => {
    const locked = r.chef && !isChef;
    return `
    <article class="card ${locked ? "locked" : ""}">
      <div class="card-top">
        <div>
          <h3>${r.name}</h3>
          <div class="meta">
            <span>${r.cuisine}</span>
            <span>${r.time}分钟</span>
            <span>厨具：${r.tools.join("、")}</span>
          </div>
        </div>
        <div class="pill">${r.score}% 匹配</div>
      </div>
      <p>已有：${r.matched.join("、") || "无"}</p>
      <p class="missing">缺少：${r.missing.join("、") || "无"}</p>
      ${locked ? `<div class="lock-note">详细步骤和替代方案需要 Chef 解锁。小馋猫，付费墙在这儿呢。</div>` : `<p>${r.steps}</p><p>替代方案：${r.substitute}</p>`}
    </article>`;
  }).join("");

  if (!isChef && results.length > 3) {
    resultDiv.innerHTML += `<div class="empty"><strong>还有 ${results.length - 3} 道推荐被隐藏。</strong><br>开通 Chef 后显示全部结果、详细步骤和替代材料。</div>`;
  }
}

document.getElementById("ingredientInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addIngredient();
});
document.getElementById("toolInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTool();
});

setupQuickButtons();
</script>
</body>
</html>
